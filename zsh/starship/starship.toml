# ──────────────────────────────────────────────
# starship.toml  —  managed by dotfiles
# symlink: ~/.config/starship.toml -> ~/dotfiles/zsh/starship/starship.toml
# ──────────────────────────────────────────────

# Wait 5ms for shell to report command status
command_timeout = 500

# Prompt format: two-line prompt
# line 1: cwd  git  lang-context  duration  status
# line 2: vi-mode indicator  $
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$rust\
$lua\
$java\
$python\
$cmd_duration\
$line_break\
$character"""

# ── Directory ─────────────────────────────────

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"~" = "~"

# ── Git ───────────────────────────────────────

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ── Languages ─────────────────────────────────

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[rust]
symbol = " "
style = "bold orange"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"
detect_files = ["pom.xml", "build.gradle", ".java-version"]

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version )]($style)"

# ── Command duration ──────────────────────────

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "[  $duration]($style) "

# ── Prompt character ──────────────────────────
# Shows vi mode: ❯ in insert mode, ❮ in normal mode

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# ── Disabled modules ──────────────────────────

[package]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true
